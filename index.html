<html>
<head>
    <title>PainBall</title>
    <link rel="stylesheet" href="pinballdes.css">

</head>
<body>
    <div id="ui">
        <div>SCORE <span id="scoreEl">0</span></div>
        <div>BEST <span id="bestEl">0</span></div>
        <div>HP <span id="livesEl">5</span></div>
    </div>

    <div id="gameWrap">
        <div id="atkBar">
            <div id="atkFill"></div>
            <span id="atkLabel">ATK</span>
        </div>

            <canvas id="game" width="360" height="560" tabindex="0"></canvas>
        </div>

        <div id="msg">A / D to flip &nbsp;</div>
        <div id="msg2">SPACE to launch &nbsp;</div>
        <div id="msg3">W to attack &nbsp;</div>
        <script src="pinballscript.js"></script>
</body>
</html>
